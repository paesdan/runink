# ======================================
# Contract Definition
# ======================================
[contract]
name = "contracts/legal/csa_review.contract"
version = "1.1.0"
schema_hash = "a7c9b03f42e2dc86e834aabcbb5c59dfafc173249e15e91307f3ef3a7b99c7ff"

# ======================================
# Compliance and Governance
# ======================================
[compliance]
level = ["SOX", "GDPR", "PCI-DSS"]
classification = "restricted"
governance_tier = "gold"

# ======================================
# Execution Context
# ======================================
[execution]
herd = "finance"
module_layer = "silver"
slo_target = "99.9"
default_masking_policy = "tokenize"
metrics_namespace = "runi_finance"
logs_tag = "finance"
tracing_sample_rate = 1.0

# ======================================
# Data Sources
# ======================================
[sources]
source_name = "CSAs from Vault"
source_uri = "s3://legal/csas/2025/"

# ======================================
# Data Sinks
# ======================================
[sinks]
valid_sink_name = "Reviewed CSA Table"
valid_sink_uri = "snowflake://LEGAL_DB.REVIEWED_CSAS"
invalid_sink_name = "Unstructured CSA DLQ"
invalid_sink_uri = "snowflake://DLQ.UNREVIEWED_CSAS"

# ======================================
# Golden Testing
# ======================================
[golden]
input = "golden/legal/csas/input.json"
output = "golden/legal/csas/reviewed.golden.json"

# ======================================
# Alerting and Notifications
# ======================================
[alerts]
on_schema_drift = "alerts/legal_schema_drift"
on_masking_failure = "alerts/policy_violation"

# ======================================
# Retention Policies
# ======================================
[retention]
lineage_retention_days = 365
log_retention_days = 180
snapshot_retention_days = 730

# ======================================
# Audit Settings
# ======================================
[audit]
critical_event_alerting = true
storage_backend = "s3://compliance-audits"
